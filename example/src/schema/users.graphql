# ==============================================================================
# Farmers Market Platform — Users & Authentication Domain
# ==============================================================================
# User accounts, addresses, preferences, and authentication artifacts.
# ==============================================================================

# ------------------------------------------------------------------------------
# User
# ------------------------------------------------------------------------------

"""
Platform user account. A single person may hold multiple roles simultaneously
(e.g. a vendor owner who is also a customer). Role resolution is contextual
and driven by the access token's active scope.
"""
type User implements Node & Timestamped & SoftDeletable & Versioned
  @model
  @scope(allow: [ADMIN, VENDOR, SHOP]) {
  id: UUID!
  version: Int @readOnly @semanticNonNull

  email: EmailAddress @semanticNonNull @constraint(max: 320)
  phone: PhoneNumber
  passwordHash: String! @serverOnly

  firstName: String @semanticNonNull @constraint(min: 1, max: 100)
  lastName: String @semanticNonNull @constraint(min: 1, max: 100)
  displayName: String @constraint(max: 150)

  """
  Computed full name: `firstName + " " + lastName`.
  """
  fullName: String @clientOnly

  avatarUrl: URL
  roles: [Role] @semanticNonNull(levels: [0, 1]) @readOnly @scope(allow: [ADMIN])

  emailVerifiedAt: DateTime @readOnly
  phoneVerifiedAt: DateTime @readOnly
  lastLoginAt: DateTime @serverOnly
  loginCount: Int @serverOnly @scope(allow: [ADMIN])

  locale: Locale
  timezone: String @constraint(max: 64)

  addresses: Address @hasMany
  preferences: UserPreferences @hasOne

  """
  Active vendor membership, if any. Null for pure customers.
  """
  vendorMembership: VendorMember @hasOne @scope(allow: [ADMIN, VENDOR])

  createdAt: DateTime @semanticNonNull @readOnly
  updatedAt: DateTime @semanticNonNull @readOnly
  deletedAt: DateTime @serverOnly
  isArchived: Boolean @readOnly
}

enum Locale {
  EN_US
  EN_GB
  ES_US
  FR_CA
}

# ------------------------------------------------------------------------------
# Address
# ------------------------------------------------------------------------------

"""
Postal address attached to a user. Addresses are soft-referenced by orders
at snapshot time so edits here do not retroactively change historical records.
"""
type Address implements Node & Timestamped @model @scope(allow: [ADMIN, VENDOR, SHOP]) {
  id: UUID!
  userId: UUID! @serverOnly

  label: AddressLabel @semanticNonNull
  recipientName: String @constraint(max: 200)
  line1: String @semanticNonNull @constraint(min: 1, max: 200)
  line2: String @constraint(max: 200)
  city: String @semanticNonNull @constraint(max: 120)
  state: String @semanticNonNull @constraint(max: 120)
  postalCode: String @semanticNonNull @constraint(pattern: "^[A-Za-z0-9 -]{3,10}$")
  countryCode: String @semanticNonNull @constraint(pattern: "^[A-Z]{2}$")
  location: GeoPoint

  isDefault: Boolean @semanticNonNull
  deliveryNotes: String @constraint(max: 500)

  user: User @belongsTo @semanticNonNull
}

enum AddressLabel {
  HOME
  WORK
  MARKET_PICKUP
  OTHER
}

# ------------------------------------------------------------------------------
# User Preferences
# ------------------------------------------------------------------------------

"""
Per-user settings and preference flags. One-to-one with User.
Split from User to keep the core record lean.
"""
type UserPreferences implements Node @model(operations: [write]) @scope(allow: [ADMIN, SHOP]) {
  id: UUID!

  emailNotifications: Boolean @semanticNonNull
  smsNotifications: Boolean @semanticNonNull
  pushNotifications: Boolean @semanticNonNull

  marketingOptIn: Boolean @semanticNonNull
  marketingOptInAt: DateTime @readOnly

  preferredCurrency: Currency @semanticNonNull
  preferredLocale: Locale @semanticNonNull

  dietaryTags: [DietaryTag] @semanticNonNull(levels: [0, 1])
  allergenAlerts: [Allergen] @semanticNonNull(levels: [0, 1])

  user: User @belongsTo @semanticNonNull
}

enum DietaryTag {
  VEGETARIAN
  VEGAN
  GLUTEN_FREE
  DAIRY_FREE
  NUT_FREE
  PALEO
  KETO
  ORGANIC_ONLY
  LOCAL_ONLY
}

# ------------------------------------------------------------------------------
# Authentication Artifacts
# ------------------------------------------------------------------------------

"""
Refresh token family for token rotation. Stored server-side;
the client only ever holds the opaque token string.
"""
type RefreshTokenFamily implements Node & Timestamped @model @scope(allow: [ADMIN]) {
  id: UUID!
  userId: UUID! @serverOnly

  tokenHash: String! @serverOnly
  familyId: UUID! @serverOnly
  generationCounter: Int!

  userAgent: String @constraint(max: 512)
  ipAddress: String @serverOnly
  revokedAt: DateTime @readOnly

  expiresAt: DateTime!

  user: User! @hasOne

  createdAt: DateTime! @readOnly
  updatedAt: DateTime! @readOnly
}

"""
Tracks password-reset and email-verification tokens.
Single-use; consumed flag prevents replay.
"""
type VerificationToken implements Node & Timestamped @model @scope(allow: [ADMIN]) {
  id: UUID!
  userId: UUID! @serverOnly

  tokenHash: String! @serverOnly
  purpose: VerificationPurpose!
  consumedAt: DateTime @readOnly
  expiresAt: DateTime!

  user: User! @hasOne

  createdAt: DateTime! @readOnly
  updatedAt: DateTime! @readOnly
}

enum VerificationPurpose {
  EMAIL_VERIFICATION
  PASSWORD_RESET
  PHONE_VERIFICATION
}

extend type Query {
  """
  Fetch the currently authenticated user's account.
  """
  me: User @scope(allow: [ADMIN, VENDOR, SHOP])
}

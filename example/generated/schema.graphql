input IDFilterInput {
  ne: ID
  eq: ID
  in: [ID!]
  exists: Boolean
}

input StringFilterInput {
  ne: String
  eq: String
  le: String
  lt: String
  ge: String
  gt: String
  in: [String!]
  contains: String
  notContains: String
  between: [String!]
  beginsWith: String
  exists: Boolean
  size: SizeFilterInput
}

input IntFilterInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  in: [Int!]
  between: [Int!]
  exists: Boolean
}

input FloatFilterInput {
  ne: Float
  eq: Float
  le: Float
  lt: Float
  ge: Float
  gt: Float
  in: [Float!]
  between: [Float!]
  exists: Boolean
}

input BooleanFilterInput {
  ne: Boolean
  eq: Boolean
  exists: Boolean
}

input SizeFilterInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int!]
}

enum SortDirection {
  ASC
  DESC
}

type User {
  id: ID!
}

type Query {
  getUser(id: ID!): User
  listUsers(filter: UserFilterInput): [User]
}

input UserFilterInput {
  id: IdFilterInput
  and: [UserFilterInput]
  or: [UserFilterInput]
  not: UserFilterInput
}

type Mutation {
  createUser(input: CreateUserInput!): User
  updateUser(input: UpdateUserInput!): User
  deleteUser(id: ID!): User
}

input CreateUserInput {
  id: ID
}

input UpdateUserInput {
  id: ID!
}